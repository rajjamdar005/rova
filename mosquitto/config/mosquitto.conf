# Mosquitto Configuration for ROVA
# This config supports both standard MQTT (1883) and WebSocket (9001) for React Native

# Standard MQTT listener (for ESP32-S3 devices)
listener 1883
protocol mqtt

# WebSocket listener (for React Native app via MQTT.js)
listener 9001
protocol websockets

# Authentication - allow anonymous for now (add auth later for production)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection messages
connection_messages true

# Message size limits (increase for OTA messages)
message_size_limit 0

# WebSocket settings
websockets_log_level 255

# QoS settings
max_queued_messages 1000
max_inflight_messages 20

# Keep alive
max_keepalive 65535
